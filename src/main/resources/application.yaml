spring:
  application:
    name: BrakOffPC
  main:
    headless: true
  web:
    error:
      whitelabel:
        enabled: false
  sql:
    init:
      mode: always
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  address: 0.0.0.0
  port: 8080
  forward-headers-strategy: framework

logging:
  level:
    org.wodrol.brakoffpc: INFO

app:
  public-url: https://brakoff.mpdwodrol.com
  desktop-settings:
    enabled: true
  security:
    operator:
      username: admin
      password: admin
    mobile:
      token: dev-mobile-token
  sqlite:
    path: ""
  ocr:
    pdftoppm-command: pdftoppm
    tesseract-command: tesseract
    language: pol+eng
    page-segmentation-mode: 6
    dpi: 400
