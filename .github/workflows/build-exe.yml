name: Build Windows Installer

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build application JAR
        shell: cmd
        run: .\mvnw.cmd -B clean package

      - name: Resolve build metadata
        shell: pwsh
        run: |
          $jar = Get-ChildItem -Path target -Filter *.jar |
            Where-Object { $_.Name -notmatch 'original|plain' } |
            Select-Object -First 1

          if (-not $jar) {
            throw "Packaged application JAR not found in target directory."
          }

          $pom = [xml](Get-Content pom.xml)
          $version = $pom.project.version

          "JAR_NAME=$($jar.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y

      - name: Build Windows app image and MSI installer
        shell: pwsh
        run: |
          if (Test-Path dist) {
            Remove-Item dist -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $workspace = (Get-Location).Path
          $iconPath = Join-Path $workspace "icon.ico"
          $jpackage = Join-Path $env:JAVA_HOME "bin\jpackage.exe"
          $appImagePath = Join-Path $workspace "dist\BrakOffPC"
          $msiPath = Join-Path $workspace "dist\BrakOffPC-$env:APP_VERSION.msi"
          $upgradeUuid = "e1be6b72-d7fb-4b35-b8b2-a529ec1938d5"

          if (-not (Test-Path $jpackage)) {
            throw "jpackage executable not found at $jpackage"
          }

          & $jpackage `
            --type app-image `
            --name BrakOffPC `
            --dest dist `
            --input target `
            --main-jar $env:JAR_NAME `
            --main-class org.springframework.boot.loader.launch.JarLauncher `
            --app-version $env:APP_VERSION `
            --vendor Wodrol `
            --description "BrakOff PC - lokalna kontrola dostaw" `
            --about-url "https://github.com/domstach00/BrakOff" `
            --icon $iconPath `
            --win-menu `
            --win-menu-group "BrakOff" `
            --win-shortcut

          if (-not (Test-Path $appImagePath)) {
            throw "jpackage did not generate dist\\BrakOffPC app image"
          }

          Compress-Archive -Path $appImagePath -DestinationPath dist\BrakOffPC-app-image.zip

          & $jpackage `
            --type msi `
            --name BrakOffPC `
            --dest dist `
            --app-image $appImagePath `
            --app-version $env:APP_VERSION `
            --vendor Wodrol `
            --description "BrakOff PC - lokalna kontrola dostaw" `
            --about-url "https://github.com/domstach00/BrakOff" `
            --icon $iconPath `
            --win-dir-chooser `
            --win-menu `
            --win-menu-group "BrakOff" `
            --win-shortcut `
            --win-shortcut-prompt `
            --win-per-user-install `
            --win-upgrade-uuid $upgradeUuid

          if (-not (Test-Path $msiPath)) {
            throw "jpackage did not generate MSI installer at $msiPath"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BrakOffPC-windows-installer
          path: |
            dist/BrakOffPC-*.msi
            dist/BrakOffPC-app-image.zip
