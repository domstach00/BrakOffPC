name: Build EXE

on:
  push:
  workflow_dispatch:

env:
  BUILD_ON_PUSH: "false"

jobs:
  build:
    if: github.event_name != 'push' || env.BUILD_ON_PUSH == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build application JAR
        shell: cmd
        run: .\mvnw.cmd -B clean package

      - name: Resolve build metadata
        shell: pwsh
        run: |
          $jar = Get-ChildItem -Path target -Filter *.jar |
            Where-Object { $_.Name -notmatch 'original|plain' } |
            Select-Object -First 1

          if (-not $jar) {
            throw "Packaged application JAR not found in target directory."
          }

          $pom = [xml](Get-Content pom.xml)
          $version = $pom.project.version

          "JAR_NAME=$($jar.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create bundled Java 21 runtime
        shell: pwsh
        run: |
          if (Test-Path build) {
            Remove-Item build -Recurse -Force
          }

          jlink `
            --output build\runtime `
            --add-modules ALL-MODULE-PATH `
            --strip-debug `
            --no-header-files `
            --no-man-pages `
            --compress=2

      - name: Create portable app image
        shell: pwsh
        run: |
          if (Test-Path dist) {
            Remove-Item dist -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path dist\app | Out-Null

          jpackage `
            --type app-image `
            --dest dist\app `
            --name BrakOffPC `
            --input target `
            --main-jar $env:JAR_NAME `
            --main-class org.springframework.boot.loader.launch.JarLauncher `
            --runtime-image build\runtime `
            --icon icon.ico `
            --vendor Wodrol `
            --app-version $env:APP_VERSION `
            --win-console

      - name: Create Windows installer EXE
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\installer | Out-Null

          jpackage `
            --type exe `
            --dest dist\installer `
            --app-image dist\app\BrakOffPC `
            --icon icon.ico `
            --vendor Wodrol `
            --app-version $env:APP_VERSION `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut

      - name: Create portable ZIP artifact
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist\app\BrakOffPC\* `
            -DestinationPath dist\BrakOffPC-portable-win64.zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BrakOffPC-windows
          path: |
            dist/installer/*.exe
            dist/BrakOffPC-portable-win64.zip
