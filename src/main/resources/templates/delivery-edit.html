<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Favicon package generated by Favicon.im Converter -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
    <meta name="theme-color" content="#ffffff">
    <title>Edycja dostawy</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<main class="page workbench-page">
    <section class="panel panel-hero review-hero">
        <div class="review-hero-copy">
            <p class="eyebrow" th:text="${pageEyebrow}"></p>
            <h1 th:text="${delivery.sourceFileName()}"></h1>
            <p class="lead" th:text="${pageLead}"></p>
        </div>
        <div class="review-summary delivery-edit-summary">
            <div class="stat-card compact">
                <span class="stat-label">Liczba pozycji</span>
                <strong class="stat-value" th:text="${dashboardRowCount}"></strong>
            </div>
            <div class="stat-card compact">
                <span class="stat-label">Oczekiwane</span>
                <strong class="stat-value" th:text="${dashboardExpectedTotal}"></strong>
            </div>
            <div class="stat-card compact">
                <span class="stat-label">Zeskanowane</span>
                <strong class="stat-value" th:text="${dashboardScannedTotal}"></strong>
            </div>
        </div>
    </section>

    <div class="flash success" th:if="${T(org.apache.commons.lang3.StringUtils).isNotBlank(message)}" th:text="${message}"></div>
    <div class="flash error" th:if="${T(org.apache.commons.lang3.StringUtils).isNotBlank(error)}" th:text="${error}"></div>

    <section class="panel table-panel">
        <div class="panel-header">
            <div>
                <p class="section-kicker">Edycja danych</p>
                <h2 th:text="${tableTitle}"></h2>
            </div>
            <div class="actions">
                <span class="count-badge" th:text="${#lists.size(dashboardRows) + ' pozycji'}"></span>
                <a class="button ghost" th:href="${backHref}" th:text="${backLabel}"></a>
            </div>
        </div>

        <form method="post" th:action="${submitAction}" th:object="${deliveryAdjustmentForm}">
            <div class="toolbar">
                <div>
                    <strong th:text="${toolbarTitle}"></strong>
                    <p class="hint" th:text="${toolbarHint}"></p>
                </div>
            </div>
            <div class="table-shell">
                <table id="delivery-adjustment-table" class="editable-table delivery-adjustment-table">
                    <colgroup>
                        <col class="col-barcode">
                        <col class="col-name">
                        <col class="col-expected">
                        <col class="col-unit">
                        <col class="col-scanned">
                        <col class="col-status">
                        <col class="col-delete">
                    </colgroup>
                    <thead>
                    <tr>
                        <th>Barcode</th>
                        <th>Nazwa</th>
                        <th>Oczekiwane</th>
                        <th>JM</th>
                        <th>Zeskanowane</th>
                        <th>Status</th>
                        <th>Usuń</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row, stat : ${dashboardRows}">
                        <td data-label="Barcode">
                            <input th:field="*{rows[__${stat.index}__].originalBarcode}" type="hidden">
                            <input th:field="*{rows[__${stat.index}__].barcode}" required>
                        </td>
                        <td data-label="Nazwa">
                            <input th:field="*{rows[__${stat.index}__].name}" required>
                        </td>
                        <td data-label="Oczekiwane">
                            <input th:field="*{rows[__${stat.index}__].expectedQty}" type="number" min="0" required>
                        </td>
                        <td data-label="JM">
                            <input th:field="*{rows[__${stat.index}__].unit}" required>
                        </td>
                        <td data-label="Zeskanowane" th:text="${row.scannedQty() + ' ' + row.unit()}"></td>
                        <td data-label="Status">
                            <span class="badge" th:text="${row.status()}"></span>
                        </td>
                        <td data-label="Usuń">
                            <label class="delete-toggle">
                                <input th:field="*{rows[__${stat.index}__].deleted}" type="checkbox" aria-label="Oznacz rekord do usunięcia">
                            </label>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="actions top-gap">
                <button type="button" class="secondary" onclick="addAdjustmentRow()">Dodaj rekord</button>
            </div>

            <div class="sticky-actions top-gap">
                <p class="hint" th:text="${saveHint}"></p>
                <button type="submit">Zapisz korektę</button>
            </div>
        </form>
    </section>
</main>
<script>
    function removeAdjustmentRow(button) {
        const row = button.closest('tr');
        if (!row) {
            return;
        }

        row.remove();
        reindexAdjustmentRows();
    }

    function reindexAdjustmentRows() {
        const rows = document.querySelectorAll('#delivery-adjustment-table tbody tr');
        rows.forEach((row, index) => {
            row.querySelectorAll('input').forEach(input => {
                if (input.name.endsWith('.originalBarcode')) {
                    input.name = `rows[${index}].originalBarcode`;
                }
                if (input.name.endsWith('.barcode')) {
                    input.name = `rows[${index}].barcode`;
                }
                if (input.name.endsWith('.name')) {
                    input.name = `rows[${index}].name`;
                }
                if (input.name.endsWith('.expectedQty')) {
                    input.name = `rows[${index}].expectedQty`;
                }
                if (input.name.endsWith('.unit')) {
                    input.name = `rows[${index}].unit`;
                }
                if (input.name.endsWith('.deleted')) {
                    input.name = `rows[${index}].deleted`;
                }
            });
        });
    }

    function addAdjustmentRow() {
        const tbody = document.querySelector('#delivery-adjustment-table tbody');
        if (!tbody) {
            return;
        }

        const index = tbody.children.length;
        const row = document.createElement('tr');
        row.innerHTML = `
            <td data-label="Barcode">
                <input name="rows[${index}].originalBarcode" type="hidden">
                <input name="rows[${index}].barcode" required>
            </td>
            <td data-label="Nazwa">
                <input name="rows[${index}].name" required>
            </td>
            <td data-label="Oczekiwane">
                <input name="rows[${index}].expectedQty" type="number" min="0" required>
            </td>
            <td data-label="JM">
                <input name="rows[${index}].unit" value="szt" required>
            </td>
            <td data-label="Zeskanowane">0 szt</td>
            <td data-label="Status">
                <span class="badge">Nowy</span>
            </td>
            <td data-label="Usuń">
                <label class="delete-toggle">
                    <input name="rows[${index}].deleted" type="checkbox" aria-label="Oznacz rekord do usunięcia">
                </label>
            </td>
        `;
        tbody.appendChild(row);
    }
</script>
</body>
</html>
