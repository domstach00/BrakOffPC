name: Build EXE

on:
  push:
  workflow_dispatch:

env:
  BUILD_ON_PUSH: "true"

jobs:
  build:
    if: github.event_name != 'push' || env.BUILD_ON_PUSH == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build application JAR
        shell: cmd
        run: .\mvnw.cmd -B clean package

      - name: Resolve build metadata
        shell: pwsh
        run: |
          $jar = Get-ChildItem -Path target -Filter *.jar |
            Where-Object { $_.Name -notmatch 'original|plain' } |
            Select-Object -First 1

          if (-not $jar) {
            throw "Packaged application JAR not found in target directory."
          }

          $pom = [xml](Get-Content pom.xml)
          $version = $pom.project.version

          "JAR_NAME=$($jar.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create bundled Java 21 runtime
        shell: pwsh
        run: |
          if (Test-Path build) {
            Remove-Item build -Recurse -Force
          }

          jlink `
            --output build\runtime `
            --add-modules ALL-MODULE-PATH `
            --strip-debug `
            --no-header-files `
            --no-man-pages `
            --compress=2

      - name: Create portable app image
        shell: pwsh
        run: |
          if (Test-Path dist) {
            Remove-Item dist -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path dist\app | Out-Null

          jpackage `
            --type app-image `
            --dest dist\app `
            --name BrakOffPC `
            --input target `
            --main-jar $env:JAR_NAME `
            --main-class org.springframework.boot.loader.launch.JarLauncher `
            --runtime-image build\runtime `
            --icon icon.ico `
            --vendor Wodrol `
            --app-version $env:APP_VERSION `
            --win-console

      - name: Export app launcher EXE
        shell: pwsh
        run: |
          $launcher = "dist\app\BrakOffPC\BrakOffPC.exe"

          if (-not (Test-Path $launcher)) {
            throw "Application launcher EXE not found at $launcher"
          }

          Copy-Item -Path $launcher -Destination dist\BrakOffPC.exe -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BrakOffPC-exe
          path: dist/BrakOffPC.exe
