name: Build EXE

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build application JAR
        shell: cmd
        run: .\mvnw.cmd -B clean package

      - name: Resolve build metadata
        shell: pwsh
        run: |
          $jar = Get-ChildItem -Path target -Filter *.jar |
            Where-Object { $_.Name -notmatch 'original|plain' } |
            Select-Object -First 1

          if (-not $jar) {
            throw "Packaged application JAR not found in target directory."
          }

          $pom = [xml](Get-Content pom.xml)
          $version = $pom.project.version

          "JAR_NAME=$($jar.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Launch4j
        shell: pwsh
        run: |
          choco install launch4j --no-progress -y

      - name: Build Windows EXE launcher
        shell: pwsh
        run: |
          if (Test-Path dist) {
            Remove-Item dist -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $workspace = (Get-Location).Path
          $jarPath = Join-Path $workspace "target\$env:JAR_NAME"
          $outFile = Join-Path $workspace "dist\BrakOffPC.exe"
          $iconPath = Join-Path $workspace "icon.ico"

          if (-not (Test-Path $jarPath)) {
            throw "Application JAR not found at $jarPath"
          }

          $launch4jConfig = @"
          <launch4jConfig>
            <dontWrapJar>false</dontWrapJar>
            <headerType>console</headerType>
            <jar>$jarPath</jar>
            <outfile>$outFile</outfile>
            <errTitle>BrakOffPC</errTitle>
            <icon>$iconPath</icon>
            <jre>
              <path></path>
              <minVersion>21</minVersion>
              <requiresJdk>false</requiresJdk>
            </jre>
          </launch4jConfig>
          "@

          Set-Content -Path dist\launch4j.xml -Value $launch4jConfig -Encoding utf8

          $launch4j = "${env:ProgramFiles(x86)}\Launch4j\launch4jc.exe"
          if (-not (Test-Path $launch4j)) {
            throw "Launch4j executable not found at $launch4j"
          }

          & $launch4j dist\launch4j.xml

          if (-not (Test-Path dist\BrakOffPC.exe)) {
            throw "Launch4j did not generate dist\\BrakOffPC.exe"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BrakOffPC-exe
          path: dist/BrakOffPC.exe
