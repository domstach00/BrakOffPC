spring:
  thymeleaf:
    cache: true

server:
  address: 127.0.0.1
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: 30d
      cookie:
        max-age: 30d

app:
  public-url: https://brakoff.mpdwodrol.com
  # Moze to byc URL aplikacji (/plik.png, https://...) albo sciezka pliku na hoście, np. /var/lib/brakoffpc/mobile-config-qr.png
  mobile-config-qr-url: ${BRAKOFF_MOBILE_CONFIG_QR_URL:}
  desktop-settings:
    enabled: false
  security:
    operator:
      username: ${BRAKOFF_OPERATOR_USERNAME}
      password: ${BRAKOFF_OPERATOR_PASSWORD}
    mobile:
      token: ${BRAKOFF_MOBILE_API_TOKEN}
  sqlite:
    path: /var/lib/brakoffpc/brakoffpc.db
