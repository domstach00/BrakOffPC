name: Build Windows Installer

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build application JAR
        shell: cmd
        run: .\mvnw.cmd -B clean package

      - name: Resolve build metadata
        shell: pwsh
        run: |
          $jar = Get-ChildItem -Path target -Filter *.jar |
            Where-Object { $_.Name -notmatch 'original|plain' } |
            Select-Object -First 1

          if (-not $jar) {
            throw "Packaged application JAR not found in target directory."
          }

          $pom = [xml](Get-Content pom.xml)
          $version = $pom.project.version

          "JAR_NAME=$($jar.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y

      - name: Install OCR tooling
        shell: pwsh
        run: |
          choco install tesseract --no-progress -y

          $candidateRoots = @(
            "${env:ProgramFiles}\Tesseract-OCR",
            "${env:ProgramFiles(x86)}\Tesseract-OCR"
          )

          $tesseractRoot = $candidateRoots |
            Where-Object { Test-Path (Join-Path $_ "tesseract.exe") } |
            Select-Object -First 1

          if (-not $tesseractRoot) {
            throw "Tesseract executable not found after Chocolatey installation."
          }

          $tessdataPath = Join-Path $tesseractRoot "tessdata"
          New-Item -ItemType Directory -Force -Path $tessdataPath | Out-Null

          foreach ($language in @("eng", "pol")) {
            $trainedDataPath = Join-Path $tessdataPath "$language.traineddata"
            Invoke-WebRequest `
              -Uri "https://raw.githubusercontent.com/tesseract-ocr/tessdata_fast/main/$language.traineddata" `
              -OutFile $trainedDataPath

            if (-not (Test-Path $trainedDataPath)) {
              throw "Missing Tesseract language data: $trainedDataPath"
            }
          }

          "TESSERACT_ROOT=$tesseractRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows app image and MSI installer
        shell: pwsh
        run: |
          if (Test-Path dist) {
            Remove-Item dist -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $workspace = (Get-Location).Path
          $iconPath = Join-Path $workspace "icon.ico"
          $jpackage = Join-Path $env:JAVA_HOME "bin\jpackage.exe"
          $appImagePath = Join-Path $workspace "dist\BrakOffPC"
          $msiPath = Join-Path $workspace "dist\BrakOffPC-$env:APP_VERSION.msi"
          $upgradeUuid = "e1be6b72-d7fb-4b35-b8b2-a529ec1938d5"

          if (-not (Test-Path $jpackage)) {
            throw "jpackage executable not found at $jpackage"
          }

          & $jpackage `
            --type app-image `
            --name BrakOffPC `
            --dest dist `
            --input target `
            --main-jar $env:JAR_NAME `
            --main-class org.springframework.boot.loader.launch.JarLauncher `
            --app-version $env:APP_VERSION `
            --vendor Wodrol `
            --description "BrakOff PC - lokalna kontrola dostaw" `
            --icon $iconPath `
            --win-menu `
            --win-menu-group "BrakOff" `
            --win-shortcut

          if (-not (Test-Path $appImagePath)) {
            throw "jpackage did not generate dist\\BrakOffPC app image"
          }

          if (-not (Test-Path $env:TESSERACT_ROOT)) {
            throw "TESSERACT_ROOT is missing or invalid."
          }

          $bundledTesseractPath = Join-Path $appImagePath "tesseract"
          New-Item -ItemType Directory -Force -Path $bundledTesseractPath | Out-Null
          Copy-Item -Path (Join-Path $env:TESSERACT_ROOT "*") -Destination $bundledTesseractPath -Recurse -Force

          if (-not (Test-Path (Join-Path $bundledTesseractPath "tesseract.exe"))) {
            throw "Bundled tesseract.exe not found in app image."
          }

          foreach ($language in @("eng", "pol")) {
            $trainedDataPath = Join-Path $bundledTesseractPath "tessdata\$language.traineddata"
            if (-not (Test-Path $trainedDataPath)) {
              throw "Bundled Tesseract language data not found: $trainedDataPath"
            }
          }

          Compress-Archive -Path $appImagePath -DestinationPath dist\BrakOffPC-app-image.zip

          $resourceDir = Join-Path $workspace "dist\jpackage-resources"
          & (Join-Path $workspace "packaging\windows\prepare-jpackage-resources.ps1") `
            -JavaHome $env:JAVA_HOME `
            -OutputDirectory $resourceDir

          & $jpackage `
            --type msi `
            --name BrakOffPC `
            --dest dist `
            --app-image $appImagePath `
            --resource-dir $resourceDir `
            --app-version $env:APP_VERSION `
            --vendor Wodrol `
            --description "BrakOff PC - lokalna kontrola dostaw" `
            --about-url "https://github.com/domstach00/BrakOff" `
            --icon $iconPath `
            --win-dir-chooser `
            --win-menu `
            --win-menu-group "BrakOff" `
            --win-shortcut `
            --win-shortcut-prompt `
            --win-per-user-install `
            --win-upgrade-uuid $upgradeUuid

          if (-not (Test-Path $msiPath)) {
            throw "jpackage did not generate MSI installer at $msiPath"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BrakOffPC-windows-installer
          path: |
            dist/BrakOffPC-*.msi
            dist/BrakOffPC-app-image.zip
